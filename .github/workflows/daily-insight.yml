name: Daily blog insight

on:
  schedule:
    # 08:07 UTC todos os dias — corresponde a 09:07 em Lisboa no verão e 08:07 no inverno.
    # Minuto deliberadamente fora de :00 para evitar picos de carga no GitHub Actions.
    - cron: '7 8 * * *'
  workflow_dispatch:
    inputs:
      model:
        description: 'Modelo Anthropic (default: claude-sonnet-4-6)'
        required: false
        default: 'claude-sonnet-4-6'

concurrency:
  group: daily-insight
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          INSIGHT_MODEL: ${{ inputs.model || 'claude-sonnet-4-6' }}
        run: node .github/scripts/publish-insight.mjs

      - name: Commit and push
        run: |
          set -euo pipefail
          if [[ ! -f .tmp-insight-slug ]]; then
            echo "Sem slug publicado (backlog vazio?). A sair."
            exit 0
          fi
          SLUG=$(cat .tmp-insight-slug)
          TOPIC=$(cat .tmp-insight-topic)
          rm -f .tmp-insight-slug .tmp-insight-topic
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/
          if git diff --cached --quiet; then
            echo "Sem mudanças para commitar."
            exit 0
          fi
          git commit -m "content(blog): publish ${SLUG}" \
            -m "Tópico: ${TOPIC}" \
            -m "Gerado pelo workflow daily-insight." \
            -m "Co-Authored-By: Claude <noreply@anthropic.com>"
          git push origin main
