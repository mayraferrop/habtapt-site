name: Daily blog insight

on:
  schedule:
    # 08:07 UTC todos os dias — corresponde a 09:07 em Lisboa no verão e 08:07 no inverno.
    # Minuto deliberadamente fora de :00 para evitar picos de carga no GitHub Actions.
    - cron: '7 8 * * *'
  workflow_dispatch:
    inputs:
      model:
        description: 'Modelo Anthropic (default: claude-sonnet-4-6)'
        required: false
        default: 'claude-sonnet-4-6'

concurrency:
  group: daily-insight
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          INSIGHT_MODEL: ${{ inputs.model || 'claude-sonnet-4-6' }}
        run: node .github/scripts/publish-insight.mjs

      - name: Commit and push
        run: |
          set -euo pipefail
          if [[ ! -f .tmp-insight-slugs ]]; then
            echo "Sem slugs publicados (backlog vazio?). A sair."
            exit 0
          fi
          SLUGS_FILE=.tmp-insight-slugs
          TOPICS_FILE=.tmp-insight-topics
          SLUG_COUNT=$(awk 'END{print NR}' "$SLUGS_FILE")
          FIRST_SLUG=$(head -n 1 "$SLUGS_FILE")
          SLUGS_LIST=$(awk '{print "  - " $0}' "$SLUGS_FILE")
          TOPICS_LIST=$(awk '{print "  - " $0}' "$TOPICS_FILE")
          rm -f "$SLUGS_FILE" "$TOPICS_FILE"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/
          if git diff --cached --quiet; then
            echo "Sem mudanças para commitar."
            exit 0
          fi
          if [[ "$SLUG_COUNT" == "1" ]]; then
            COMMIT_TITLE="content(blog): publish ${FIRST_SLUG}"
          else
            COMMIT_TITLE="content(blog): publish ${SLUG_COUNT} insights (${FIRST_SLUG} +${SLUG_COUNT}...)"
          fi
          git commit -m "$COMMIT_TITLE" \
            -m "Slugs:" \
            -m "$SLUGS_LIST" \
            -m "Tópicos:" \
            -m "$TOPICS_LIST" \
            -m "Gerado pelo workflow daily-insight." \
            -m "Co-Authored-By: Claude <noreply@anthropic.com>"
          git push origin main
          echo "pushed=true" >> "$GITHUB_OUTPUT"
        id: commit_push

      - name: Dispatch Cloudflare Pages deploy
        if: steps.commit_push.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run cloudflare-pages.yml --ref main
          echo "Deploy workflow disparado (o Notify search engines segue em cadeia via workflow_run)."
